name: code-quality
# Universal quality workflow — auto-detects languages and runs the matching linter with
# codehealth's CENTRAL config (single source of truth). ANNOTATE-ONLY for now: findings
# appear as inline PR annotations and NEVER block the build (the linter step always
# succeeds). A SonarQube scan feeds the self-hosted server for languages it covers.
# Policy: collect data now, clean up repos one by one, switch to a blocking gate later.
on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup python
        if: hashFiles('**/*.py') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: ruff (annotate)
        if: hashFiles('**/*.py') != ''
        run: |
          pipx install ruff
          curl -fsS -H "Authorization: Bearer ${{ secrets.CODEHEALTH_INGEST_TOKEN }}" \
            https://codehealth.ibotz.fun/api/config/ruff.toml -o /tmp/ruff.toml
          ruff check --config /tmp/ruff.toml --output-format=github . || true

      - name: oxlint (annotate)
        if: hashFiles('**/*.js','**/*.jsx','**/*.ts','**/*.tsx','**/*.mjs','**/*.cjs') != ''
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CODEHEALTH_INGEST_TOKEN }}" \
            https://codehealth.ibotz.fun/api/config/oxlintrc.json -o .oxlintrc.json
          npx --yes oxlint -c .oxlintrc.json --format=github . || true

      - name: shellcheck (annotate)
        if: hashFiles('**/*.sh','**/*.bash') != ''
        run: |
          find . -type f \( -name '*.sh' -o -name '*.bash' \) -not -path '*/.git/*' -print0 \
            | xargs -0 -r shellcheck -f gcc -S warning -e SC1090,SC1091,SC2154 || true

      - name: setup go
        if: hashFiles('**/*.go') != ''
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: gofumpt (annotate formatting drift)
        if: hashFiles('**/*.go') != ''
        run: |
          go install mvdan.cc/gofumpt@latest || true
          "$(go env GOPATH)/bin/gofumpt" -l . 2>/dev/null | while read -r f; do
            echo "::warning file=$f::not gofmt/gofumpt-formatted (run gofumpt -w)"; done || true

      - name: PSScriptAnalyzer (annotate)
        if: hashFiles('**/*.ps1','**/*.psm1') != ''
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction SilentlyContinue
          Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "::warning file=$($_.ScriptPath),line=$($_.Line)::$($_.RuleName): $($_.Message)" }

  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: key
        name: lowercase project key (match codehealth canonical name)
        run: echo "k=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # --- run existing tests + collect coverage (non-blocking; fed to Sonar below) ---
      - name: setup python
        if: hashFiles('**/test_*.py','**/*_test.py','**/tests/**') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: python tests + coverage
        if: hashFiles('**/test_*.py','**/*_test.py','**/tests/**') != ''
        run: |
          python -m pip install -q pytest pytest-cov
          pip install -q -e . 2>/dev/null || pip install -q -r requirements.txt 2>/dev/null || true
          # PYTHONPATH=. so flat-layout repos (package dir at repo root) import cleanly
          PYTHONPATH=. pytest --cov=. --cov-report=xml -q || true

      - name: setup go
        if: hashFiles('**/*_test.go') != ''
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: go tests + coverage
        if: hashFiles('**/*_test.go') != ''
        run: go test -coverprofile=coverage.out ./... || true

      - name: node tests
        if: hashFiles('**/package.json') != ''
        run: |
          npm ci 2>/dev/null || npm install 2>/dev/null || true
          npm test 2>/dev/null || true

      - name: SonarQube scan
        # only for languages SonarQube Community covers (hashFiles is allowed at step level)
        if: hashFiles('**/*.py','**/*.js','**/*.jsx','**/*.ts','**/*.tsx','**/*.go','**/*.kt','**/*.kts','**/*.java') != ''
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonar.ibotz.fun
        with:
          args: >
            -Dsonar.projectKey=${{ steps.key.outputs.k }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/.venv/**,**/venv/**,**/vendor/**,**/dist/**,**/build/**,**/.next/**,**/*.min.js,**/data/repos/**
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info,**/lcov.info
