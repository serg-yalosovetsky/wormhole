# Triggered on version tags (e.g. v1.2.3) or manually via workflow_dispatch.
#
# Required GitHub Secrets:
#   GOOGLE_SERVICES_JSON   — full contents of android/app/google-services.json
#   SIGNING_KEY_BASE64     — base64-encoded Android keystore (run: base64 keystore.jks)
#   KEY_ALIAS              — key alias inside the keystore
#   KEYSTORE_PASSWORD      — keystore password
#   KEY_PASSWORD           — key password

name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Windows: cross-compile from Ubuntu (CGO_ENABLED=0, no Windows runner needed)
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: windows/go.mod
          cache-dependency-path: windows/go.sum

      - name: Build Windows exe
        working-directory: windows
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
          GOFLAGS: -mod=mod
        run: |
          go mod download all
          go build -ldflags="-s -w -H=windowsgui" -o wormhole-windows-amd64.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: windows/wormhole-windows-amd64.exe

  # ─────────────────────────────────────────────────────────────────────────
  # Android: gomobile AAR  →  Gradle release APK  →  sign
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Go + gomobile ──────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: native/go.mod
          cache-dependency-path: native/go.sum

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20240213143359-d1f7d3436075
          go install golang.org/x/mobile/cmd/gobind@v0.0.0-20240213143359-d1f7d3436075

      # ── Android NDK (required by gomobile) ────────────────────────────
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
          add-to-path: false

      # ── Build wormhole.aar ─────────────────────────────────────────────
      - name: Build wormhole.aar
        working-directory: native
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          GOFLAGS: -mod=mod
        run: |
          go mod download
          go mod download golang.org/x/mobile
          gomobile init
          mkdir -p ../android/app/libs
          gomobile bind \
            -target android \
            -androidapi 24 \
            -ldflags="-s -w" \
            -o ../android/app/libs/wormhole.aar \
            .

      # ── Java ───────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Gradle (no wrapper needed in repo) ────────────────────────────
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-read-only: false

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon -q

      # ── Sign APK ───────────────────────────────────────────────────────
      - name: Sign APK
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$SIGNING_KEY_BASE64" ]; then
            echo "ERROR: SIGNING_KEY_BASE64 secret is not set" >&2
            exit 1
          fi
          echo "$SIGNING_KEY_BASE64" | base64 -d > keystore.jks
          BUILD_TOOLS=$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner"
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "wormhole-android-${{ github.ref_name }}.apk" \
            "$UNSIGNED"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: wormhole-android-*.apk

  # ─────────────────────────────────────────────────────────────────────────
  # Backend: package as tar.gz (no compilation needed for Python)
  # ─────────────────────────────────────────────────────────────────────────
  package-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package backend
        run: |
          tar -czf wormhole-backend-${{ github.ref_name }}.tar.gz \
            -C backend main.py requirements.txt Dockerfile railway.toml

      - uses: actions/upload-artifact@v4
        with:
          name: backend-pkg
          path: wormhole-backend-*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────
  # Backend Docker: build and push image to GHCR
  # ─────────────────────────────────────────────────────────────────────────
  build-backend-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        working-directory: backend
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/wormhole-backend:${{ github.ref_name }}
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Release: collect all artifacts and publish
  # ─────────────────────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-android, package-backend, build-backend-docker]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
